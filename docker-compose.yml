services:
  postgres:
    image: postgres:16-alpine
    container_name: milltrace-pk-postgres
    environment:
      POSTGRES_DB: milltrace_pk
      POSTGRES_USER: milltrace
      POSTGRES_PASSWORD: milltrace
    ports:
      - "5432:5432"
    volumes:
      - milltrace-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milltrace -d milltrace_pk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  milltrace-postgres-data:

